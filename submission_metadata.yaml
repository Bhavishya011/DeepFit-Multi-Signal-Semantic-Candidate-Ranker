ai_tools_used:
  - "Claude"
  - "GitHub Copilot"

ai_usage_summary: |
  Used Claude for architecture discussion, JD-intent decomposition, and code review.
  Used GitHub Copilot for autocomplete. Used Claude once (offline) to draft the
  JD-intent schema from the JD prose; the schema was then hand-reviewed and edited.
  No candidate data was fed to any LLM. No LLM calls during the ranking step.

methodology_summary: |
  Multi-signal semantic ranker with 10 modules: (1) JD-Intent Schema parsing the JD
  into 16 structured axes (5 positive reqs + 5 nice-to-haves + 5 skill groups + title
  archetype); (2) Multi-field TF-IDF embeddings (title, summary, career, skills,
  combined) with field weights (title 3x); (3) Hard honeypot filter (8 rules) +
  soft trap scorer (5 rules) — filters 36.5% of 100K pool; (4) Production-evidence
  regex extractor (30+ patterns) distinguishing shipped ML from research-only;
  (5) Multiplicative availability multiplier in [0.30, 1.20] (recency × response_rate
  × open_to_work × notice × github × demand); (6) Structural score (YOE band 5-9,
  location tiers, education tiers, work_mode); (6.5) Skill taxonomy resolver with
  200+ custom AI aliases (RAG, LoRA, vLLM, Pinecone); (7) FAISS-only coarse recall
  top-1000; (8) Multi-axis semantic scoring (title_fit, career_retrieval, career_ranking,
  career_llm, skills_coverage, cross_enc); (9) Final combiner: final = base × honeypot
  × trap × availability where base = 0.55×semantic + 0.20×structural + 0.10×production
  + 0.10×esco + 0.05×seniority; (10) Evidence-grounded reasoning generator with 6
  templates, anti-hallucination CI checks. Runtime ~30s for 100K candidates on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
