ai_usage_summary: |
  Used Claude for architecture discussion, JD-intent decomposition, and code review.
  Used GitHub Copilot for autocomplete. Used Claude once (offline) to draft the
  JD-intent schema from the JD prose; the schema was then hand-reviewed and edited.
  No candidate data was fed to any LLM. No LLM calls during the ranking step.

methodology_summary: |
  Multi-signal semantic ranker with 5 differentiated modules: (1) JD-Intent Decoder
  parsing the JD into structured positive + negative + context axes; (2) Multi-field
  candidate embeddings (title, summary, career, skills) with per-field weights;
  (3) Hard honeypot + soft trap consistency scorer (kills keyword-stuffers);
  (4) Production-evidence regex extractor distinguishing shipped ML from research-only;
  (5) Multiplicative availability multiplier in [0.30, 1.20] so dead candidates sink
  even with perfect semantic match. Final score = additive base (semantic 0.55,
  structural 0.20, production 0.10, esco_coverage 0.10, seniority 0.05) multiplied
  by honeypot (0/1), trap (0.3/1.0), and availability. Cascade: per-field BM25 +
  FAISS dense RRF recall top-1000, bge-reranker-base ONNX int8 rerank top-500.
  Reasoning is template-based with anti-hallucination CI checks. Runtime ~50s
  for 100K candidates on CPU.

declarations:
  read_submission_spec: true
