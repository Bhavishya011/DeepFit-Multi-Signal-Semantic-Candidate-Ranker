# Skill Taxonomy — Canonical Skill Aliases
# ============================================================================
# Maps informal / vendor-specific / 2024-2026 AI terminology to canonical
# skill names. Used by ranker/features.py (Module 6.5).
#
# Layered ON TOP OF ESCO. ESCO matches come first (if we add ESCO lookup
# later); aliases fill the gap for modern AI terms ESCO hasn't indexed yet.
#
# Match logic (case-insensitive substring against text blob):
#   text_blob = " ".join(skill.name for skill in candidate.skills)
#             + " ".join(career.description for career in career_history)
#   for canonical, entry in alias_map.items():
#       for alias in entry.aliases:
#           if alias.lower() in text_blob.lower():
#               matched.add(canonical)
#               break
#
# Why both skills + career descriptions?
#   - "skills" list is curated by candidate; high precision but missing context
#   - career_history descriptions often mention tools/patterns in context
#     ("Built RAG with LangChain and Pinecone" might not appear in skills list
#      but does appear in career description)
# ============================================================================

